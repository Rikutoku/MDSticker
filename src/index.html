<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MDSticker</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>

        </svg> -->


        <!-- ── Draggable header ────────────────────────────────────────────────── -->
        <!-- Collapses (opacity → 0, height → 0) when the window loses focus.      -->
        <div class="header" id="header">
            <!--<button id="btn-open" class="ActionButtons" title="Open new note">

            </button>-->


            <button id="btn-open" title="Open new note">Open</button>

            <!-- btn-color wraps a hidden <input type="color"> so clicking the button
         activates the native colour picker without extra JS ceremony.        -->
            <button id="btn-color" title="Accent color">
                <img
                    src="/assets/color-swatch.svg"
                    alt="Open"
                    width="16"
                    height="16"
                />
                <input type="color" id="color-input" tabindex="-1" />
            </button>

            <button id="btn-close" title="Close window">
                &#10006
            </button>
        </div>

        <!-- ── Scrollable Markdown render area ────────────────────────────────── -->
        <div class="content" id="content"></div>

        <!--
        marked.umd.js  ← place this file here before running.
        Download the latest release from:
          https://github.com/markedjs/marked/releases
        (look for marked.umd.js in the release assets, or use marked.min.js and rename it)
      -->
        <script src="marked.umd.js"></script>
        <script src="main.js"></script>
    </body>
</html>
